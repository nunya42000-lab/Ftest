<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Gesture Batch Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05050a; color: #f3f4f6; touch-action: none; overscroll-behavior: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .mirror { transform: scaleX(-1); }
        .zoom-wrapper { transition: transform 0.3s ease; transform-origin: top center; }
    </style>
</head>
<body class="flex flex-col h-screen p-4 md:p-6 font-sans overflow-hidden">

    <!-- Header Grid -->
    <header class="flex justify-between items-center mb-4 flex-shrink-0 border-b border-emerald-950/40 pb-3">
        <div>
            <h1 class="text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-400 to-cyan-500">
                NEXUS BATCH CALIBRATION
            </h1>
            <p class="text-xs text-gray-500 font-mono tracking-wider">OMNIGESTURE DATASET GENERATOR</p>
        </div>
        <div class="flex gap-3 items-center">
            <select id="camera-zoom" class="bg-gray-900 border border-gray-700 text-emerald-400 text-xs font-mono font-bold rounded px-2 py-1 outline-none focus:border-emerald-500 transition-all">
                <option value="1">ZOOM: 100%</option>
                <option value="0.9">ZOOM: 90%</option>
                <option value="0.7">ZOOM: 70%</option>
                <option value="0.5">ZOOM: 50%</option>
            </select>
            <div id="vision-status-badge" class="bg-emerald-950/30 text-yellow-500 px-3 py-1 rounded border border-yellow-500/30 text-xs font-mono font-bold tracking-widest animate-pulse">
                LOADING MATRIX...
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col lg:flex-row gap-4 min-h-0 pb-4 relative">
        
        <!-- Setup Phase: Queue Editor (Overlayed until started) -->
        <div id="setup-panel" class="absolute inset-0 z-40 bg-black flex flex-col gap-4 pb-4">
            <div class="bg-gray-950 p-4 rounded-xl border border-emerald-900/50 shadow-lg flex-1 flex flex-col min-h-0">
                <div class="flex justify-between items-center mb-2 flex-shrink-0">
                    <span class="text-sm font-mono text-emerald-400 font-bold tracking-widest">GESTURE QUEUE EDITOR</span>
                    <span class="text-[10px] text-gray-500 font-mono">ADD/REMOVE LINE BY LINE</span>
                </div>
                <textarea id="queue-editor" class="flex-1 bg-black text-emerald-300 p-4 rounded-lg border border-gray-800 font-mono text-sm focus:border-emerald-500 outline-none transition-colors resize-none whitespace-pre no-scrollbar shadow-inner"></textarea>
            </div>
            <button id="start-batch-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 transition-all text-white font-black tracking-widest py-5 rounded-xl text-lg border-b-4 border-emerald-800 shadow-xl">
                LOCK QUEUE & BOOT CAMERA PIPELINE
            </button>
        </div>

        <!-- Video & Controls Block -->
        <div class="flex flex-col min-h-0 space-y-4 lg:w-1/2 flex-shrink-0">
            <!-- Active Target Display -->
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-3 flex justify-between items-center shadow-md">
                <div class="space-y-1">
                    <span class="text-[10px] uppercase font-mono tracking-widest text-emerald-500">Current Target Pose</span>
                    <h2 id="active-target-label" class="text-xl font-black tracking-wide text-white">--</h2>
                </div>
                <div class="text-right">
                    <span class="text-[10px] uppercase font-mono tracking-widest text-gray-500">Progress</span>
                    <h2 id="queue-progress" class="text-lg font-mono font-bold text-gray-300">0 / 0</h2>
                </div>
            </div>

            <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden border border-gray-900 shadow-2xl flex-shrink-0 flex items-center justify-center">
                <div id="video-wrapper" class="relative w-full h-full zoom-wrapper">
                    <video id="webcam" class="absolute inset-0 w-full h-full object-cover mirror" autoplay playsinline></video>
                    <canvas id="output_canvas" class="absolute inset-0 w-full h-full object-cover mirror z-10 pointer-events-none"></canvas>
                </div>
                
                <!-- Live Engine HUD -->
                <div id="gesture-hud-overlay" class="absolute bottom-4 left-4 z-20 bg-black/80 px-4 py-2 rounded-lg border border-emerald-500/30 font-mono text-xs shadow-lg">
                    Engine Says: <span id="hud-current-gesture" class="text-emerald-400 font-black tracking-widest text-sm">none</span>
                </div>

                <!-- Countdown Overlay -->
                <div id="countdown-overlay" class="absolute inset-0 z-30 flex items-center justify-center bg-black/60 hidden backdrop-blur-sm">
                    <span id="countdown-text" class="text-7xl font-black text-emerald-400 animate-ping">3</span>
                </div>
            </div>

            <!-- Action Controls -->
            <div class="flex gap-2">
                <button id="skip-btn" class="flex-1 bg-gray-900 hover:bg-gray-800 active:scale-95 text-gray-400 font-black tracking-widest py-4 rounded-xl text-sm border border-gray-800 transition-all">
                    ⏭️ SKIP
                </button>
                <button id="snapshot-btn" class="flex-[2] bg-emerald-700 hover:bg-emerald-600 active:scale-95 text-white font-black tracking-widest py-4 rounded-xl text-sm border-b-4 border-emerald-900 transition-all shadow-lg flex justify-center items-center gap-2">
                    <span>📸 CAPTURE (3s)</span>
                </button>
            </div>
        </div>

        <!-- System Logs & Export Console -->
        <div class="flex flex-col min-h-0 border border-gray-900 bg-black rounded-xl p-4 shadow-xl lg:w-1/2">
            <div class="flex items-center justify-between pb-3 border-b border-gray-900 mb-3 flex-shrink-0">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></div>
                    <span class="text-xs font-mono font-bold tracking-wider text-gray-400">DATASET MASTER JSON</span>
                </div>
                <div class="flex gap-2">
                    <button id="copy-export-btn" class="px-5 py-2 bg-emerald-950/40 hover:bg-emerald-900/60 active:scale-95 text-[10px] font-mono font-bold text-emerald-400 hover:text-white rounded border border-emerald-800 transition-all shadow-md">
                        COPY ALL JSON 📋
                    </button>
                </div>
            </div>
            
            <textarea id="json-export" class="flex-1 bg-gray-950 border border-gray-900 rounded-lg p-3 font-mono text-[10px] text-emerald-500/80 resize-none outline-none focus:border-emerald-900 transition-all" readonly placeholder="// Complete batch dataset will compile here..."></textarea>
            
            <div id="log-container" class="h-24 overflow-y-auto font-mono text-[10px] space-y-1 pr-1 mt-3 border-t border-gray-900/50 pt-2 no-scrollbar flex flex-col-reverse">
                <div class="text-gray-700 italic mt-auto">Hardware ready. Configure queue to begin...</div>
            </div>
        </div>
    </main>

    <script type="module">
        import { FilesetResolver, GestureRecognizer } from "./wasm/vision_bundle.js";

        const TASK_FILE_PATH = "./wasm/gesture_recognizer.task";

        // --- Default Pre-Made Queue ---
        const DEFAULT_QUEUE = [
            "👍","👎","✊","👊","🖐️","🖖","🤟","🤘","✌️","🤞","🤙","🤏","👌","🫵","🖕","👆","👇"
        ];

        // --- DOM Elements ---
        const queueEditor = document.getElementById('queue-editor');
        const setupPanel = document.getElementById('setup-panel');
        const startBatchBtn = document.getElementById('start-batch-btn');
        const videoWrapper = document.getElementById('video-wrapper');
        const cameraZoom = document.getElementById('camera-zoom');
        
        const activeTargetLabel = document.getElementById('active-target-label');
        const queueProgress = document.getElementById('queue-progress');
        const skipBtn = document.getElementById('skip-btn');
        const snapshotBtn = document.getElementById('snapshot-btn');
        
        const video = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusBadge = document.getElementById('vision-status-badge');
        const logContainer = document.getElementById('log-container');
        const hudCurrentGesture = document.getElementById('hud-current-gesture');
        
        const jsonExport = document.getElementById('json-export');
        const copyExportBtn = document.getElementById('copy-export-btn');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownText = document.getElementById('countdown-text');

        // --- Batch Engine State ---
        let recognizer;
        let webcamRunning = false;
        let lastVideoTime = -1;
        let capturePending = false;
        
        let batchQueue = [];
        let currentIndex = 0;
        let dataset = [];

        // Initialize Textarea
        queueEditor.value = DEFAULT_QUEUE.join("\n");

        // --- Logging & Export ---
        function streamLog(msg, type = 'normal') {
            const timestamp = new Date().toISOString().slice(11, 19);
            const row = document.createElement('div');
            if (type === 'trigger') row.className = 'text-emerald-400 font-bold';
            else if (type === 'error') row.className = 'text-red-400 font-bold';
            else row.className = 'text-gray-500';
            row.textContent = `[${timestamp}] ${msg}`;
            logContainer.prepend(row);
        }

        copyExportBtn.onclick = async () => {
            if (dataset.length === 0) return;
            try {
                await navigator.clipboard.writeText(JSON.stringify(dataset, null, 2));
                const prev = copyExportBtn.innerHTML; 
                copyExportBtn.innerHTML = "COPIED TO CLIPBOARD! ✔️";
                setTimeout(() => copyExportBtn.innerHTML = prev, 1500);
            } catch (err) { alert("Clipboard blocked. Select text manually."); }
        };

        // --- Digital Zoom Handler ---
        cameraZoom.addEventListener('change', (e) => {
            const scaleVal = e.target.value;
            videoWrapper.style.transform = `scale(${scaleVal})`;
        });

        // --- Batch Sequence Logic ---
        function loadCurrentTarget() {
            if (currentIndex >= batchQueue.length) {
                activeTargetLabel.textContent = "🎉 BATCH COMPLETE";
                activeTargetLabel.className = "text-xl font-black tracking-wide text-yellow-400";
                queueProgress.textContent = `${currentIndex} / ${batchQueue.length}`;
                snapshotBtn.disabled = true;
                skipBtn.disabled = true;
                streamLog("Queue completely parsed. Ready for export.", "trigger");
                return;
            }
            activeTargetLabel.textContent = batchQueue[currentIndex];
            queueProgress.textContent = `${currentIndex + 1} / ${batchQueue.length}`;
        }

        skipBtn.onclick = () => {
            streamLog(`Skipped: ${batchQueue[currentIndex]}`, "info");
            currentIndex++;
            loadCurrentTarget();
        };

        snapshotBtn.onclick = () => {
            if (!webcamRunning) return streamLog("Camera offline.", "error");
            
            snapshotBtn.disabled = true;
            skipBtn.disabled = true;
            countdownOverlay.classList.remove('hidden');
            
            let count = 3;
            countdownText.textContent = count;
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownText.textContent = count;
                } else {
                    clearInterval(timer);
                    countdownOverlay.classList.add('hidden');
                    capturePending = batchQueue[currentIndex]; // Arm trap with target name
                }
            }, 1000);
        };

        function processSuccessfulCapture(landmarkData, engineRead) {
            const snapshotData = {
                target_label: capturePending,
                engine_interpretation: engineRead,
                capture_mode: "static_frame", // Tagged for future sequence architectural planning
                timestamp: Date.now(),
                landmarks: landmarkData.map(p => ({ x: p.x.toFixed(4), y: p.y.toFixed(4), z: p.z.toFixed(4) }))
            };
            
            dataset.push(snapshotData);
            jsonExport.value = JSON.stringify(dataset, null, 2);
            jsonExport.scrollTop = jsonExport.scrollHeight; 
            
            streamLog(`SAVED: [${capturePending}]`, 'trigger');
            document.body.style.backgroundColor = '#ffffff'; 
            setTimeout(() => document.body.style.backgroundColor = '#05050a', 150);
            
            capturePending = false; 
            currentIndex++;
            loadCurrentTarget();
            
            snapshotBtn.disabled = false;
            skipBtn.disabled = false;
        }

        // --- Camera & AI Initialization ---
        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("./wasm");
                recognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: TASK_FILE_PATH, delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                
                statusBadge.textContent = "CORE ONLINE";
                statusBadge.className = "bg-emerald-950 text-emerald-400 px-3 py-1 rounded border border-emerald-500/40 text-xs font-mono font-bold tracking-widest";
                streamLog("Skeletal Module loaded.", "normal");
            } catch (e) {
                streamLog(`INIT ERROR: ${e.message}`, "error");
                statusBadge.textContent = "CORE FAULT";
            }
        }

        startBatchBtn.onclick = () => {
            // Parse queue
            const rawText = queueEditor.value.trim();
            if (!rawText) return alert("Queue is empty!");
            batchQueue = rawText.split('\n').map(line => line.trim()).filter(line => line !== "");
            
            setupPanel.classList.add('hidden'); // Hide editor
            loadCurrentTarget();

            // Force wide field of view request via high resolution constraints
            const constraints = { 
                video: { 
                    facingMode: "user", 
                    width: { ideal: 1920 }, 
                    height: { ideal: 1080 } 
                } 
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", () => {
                        webcamRunning = true;
                        streamLog("Batch pipeline active.", "normal");
                        predictWebcam();
                    });
                })
                .catch((err) => streamLog(`STREAM EXCEPTION: ${err.message}`, "error"));
        };

        // --- Finger Math & Drawing ---
        // --- 1. VOLUMETRIC 3D STATE ANALYZER ---
function analyzeHandState(lm) {
    // Calculate true 3D distance including depth (z-axis)
    const dist3D = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y, p1.z - p2.z);
    const wrist = lm[0];

    // Fingers: Evaluated as OPEN if the Tip is 20% further from the wrist than the PIP joint
    const isExtended = (tip, pip) => dist3D(wrist, lm[tip]) > (dist3D(wrist, lm[pip]) * 1.2);
    
    const I = isExtended(8, 6);
    const M = isExtended(12, 10);
    const R = isExtended(16, 14);
    const P = isExtended(20, 18);

    // Thumb: Evaluated as OPEN if the tip is further from the palm center than the width of the palm
    const thumbToPalm = dist3D(lm[4], lm[9]);
    const palmWidth = dist3D(lm[5], lm[17]);
    const T = (thumbToPalm / palmWidth) > 1.0;

    // Specialty Checks
    const isPinching = dist3D(lm[4], lm[8]) < 0.08;

    return { T, I, M, R, P, isPinching, lm };
}

// --- 2. MATRIX SIGNATURE MAPPER ---
function determineGestureName(state) {
    const { T, I, M, R, P, isPinching, lm } = state;
    
    // Find primary hand direction using palm vector
    const dx = lm[9].x - lm[0].x;
    const dy = lm[9].y - lm[0].y;
    const palmDir = Math.abs(dx) > Math.abs(dy) ? (dx < 0 ? "right" : "left") : (dy < 0 ? "up" : "down");
    
    // Find isolated thumb direction (for thumbs up/down vectors)
    const tDx = lm[4].x - lm[2].x;
    const tDy = lm[4].y - lm[2].y;
    const thumbDir = Math.abs(tDx) > Math.abs(tDy) ? (tDx < 0 ? "right" : "left") : (tDy < 0 ? "up" : "down");

    // --- EXACT EMOJI SIGNATURE MATCHING ---
    
    if (isPinching && M && R && P) return "👌 OK Sign";
    if (isPinching && !M && !R && !P) return "🤏 Pinch";
    
    if (T && !I && !M && !R && !P) return `👍/👎 Thumb ${thumbDir}`;
    
    // Pointing logic (handles both strict 1-finger and your natural 'thumb-out' gun point)
    if (!T && I && !M && !R && !P) return `☝️ 1 Finger ${palmDir}`;
    if (T && I && !M && !R && !P) return `🫵 Point / Gun ${palmDir}`;
    
    if (!T && !I && M && !R && !P) return `🖕 Middle Finger`;
    
    if (!T && I && M && !R && !P) return `✌️ Peace ${palmDir}`;
    if (T && I && M && !R && !P) return `✌️ Peace (Thumb Out) ${palmDir}`;
    
    if (!T && I && !M && !R && P) return `🤘 Rock On`;
    if (T && I && !M && !R && P) return `🤟 I Love You`;
    if (T && !I && !M && !R && P) return `🤙 Shaka`;
    
    if (!T && !I && !M && !R && !P) return `✊/👊 Fist ${palmDir}`;
    
    if (!T && I && M && R && !P) return `3 Fingers ${palmDir}`;
    if (!T && I && M && R && P) return `✋ 4 Fingers ${palmDir}`;
    
    if (T && I && M && R && P) {
        // Measure the physical gap between the Middle and Ring fingers to separate Vulcan from 5 Fingers
        const gap = Math.hypot(lm[12].x - lm[16].x, lm[12].y - lm[16].y);
        return gap > 0.12 ? `🖖 Vulcan` : `🖐️ 5 Fingers ${palmDir}`;
    }

    // Dynamic Fallback for unlabeled transitions
    const count = [T, I, M, R, P].filter(Boolean).length;
    return `hand_${count}_${palmDir}`;
}

        function drawSkeleton(ctx, landmarks, w, h) {
            const connectors = [
                [0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8],
                [5, 9], [9, 10], [10, 11], [11, 12], [9, 13], [13, 14], [14, 15], [15, 16],
                [13, 17], [0, 17], [17, 18], [18, 19], [19, 20]
            ];
            ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.strokeStyle = "#059669";
            for (const [start, end] of connectors) {
                ctx.beginPath(); ctx.moveTo(landmarks[start].x * w, landmarks[start].y * h);
                ctx.lineTo(landmarks[end].x * w, landmarks[end].y * h); ctx.stroke();
            }
            ctx.fillStyle = "#ffffff";
            for (const p of landmarks) {
                ctx.beginPath(); ctx.arc(p.x * w, p.y * h, 3, 0, 2 * Math.PI); ctx.fill();
            }
        }

        // --- Hardware Execution Loop ---
        function predictWebcam() {
            if (!webcamRunning) return;

            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;
            const w = canvasElement.width;
            const h = canvasElement.height;

            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                try {
                    const results = recognizer.recognizeForVideo(video, performance.now());
                    canvasCtx.clearRect(0, 0, w, h);

                    if (results.landmarks && results.landmarks.length > 0) {
                        const lm = results.landmarks[0];
                        drawSkeleton(canvasCtx, lm, w, h);

                        // Remove the old finger math, and drop this in instead:
const state = analyzeHandState(lm);
const currentGesture = determineGestureName(state);
hudCurrentGesture.textContent = currentGesture;


                        if (capturePending !== false) {
                            processSuccessfulCapture(lm, currentGesture);
                        }
                    } else {
                        hudCurrentGesture.textContent = "none";
                        if (capturePending !== false) {
                            streamLog(`CAPTURE FAILED: Hand lost from frame. Retry.`, 'error');
                            capturePending = false;
                            snapshotBtn.disabled = false;
                            skipBtn.disabled = false;
                        }
                    }
                } catch (e) {
                    streamLog(`Frame Analysis Error: ${e.message}`, "error");
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        initAI();
    </script>
</body>
</html>
