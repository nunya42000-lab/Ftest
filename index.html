<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Asset Compiler (Base64)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #030712; 
            color: #f3f4f6; 
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="max-w-3xl w-full bg-gray-950 border border-gray-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col">
        
        <!-- Header -->
        <div class="p-6 border-b border-gray-800 bg-gray-900/50">
            <h1 class="text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-500 mb-1">
                STANDALONE BASE64 COMPILER
            </h1>
            <p class="text-xs text-gray-400 font-mono">CONVERT LOCAL ASSETS (.TASK, .WASM, .JS) INTO PORTABLE MEMORY STRINGS</p>
        </div>

        <div class="p-6 space-y-6 flex-grow flex flex-col">
            
            <!-- Drag & Drop Zone -->
            <div id="drop-zone" class="border-2 border-dashed border-gray-700 hover:border-purple-500 bg-gray-900/50 rounded-xl p-8 text-center cursor-pointer transition-colors group relative">
                <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <div class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-200">📦</div>
                <span class="text-sm font-mono font-bold text-gray-300 block">CLICK OR DROP FILE HERE</span>
                <span class="text-xs font-mono text-gray-500 block mt-2">File will be processed entirely locally in your browser.</span>
            </div>

            <!-- Status Indicator -->
            <div id="status-bar" class="hidden flex items-center gap-2 p-3 rounded-lg bg-gray-900 border border-gray-800">
                <div id="status-spinner" class="w-3 h-3 rounded-full bg-purple-500 animate-ping"></div>
                <span id="status-text" class="text-xs font-mono text-gray-300">Processing...</span>
            </div>

            <!-- Output Box -->
            <div class="flex-grow flex flex-col space-y-2">
                <div class="flex justify-between items-end">
                    <label class="text-xs font-mono tracking-widest text-purple-400 font-bold uppercase">Compiled Output</label>
                    <span id="file-size-display" class="text-[10px] font-mono text-gray-500"></span>
                </div>
                
                <textarea id="output-area" readonly placeholder="Awaiting file payload..." class="w-full h-48 md:h-64 bg-[#0a0a0a] text-gray-400 font-mono text-xs p-4 rounded-xl border border-gray-800 outline-none resize-none focus:border-purple-500 transition-colors no-scrollbar"></textarea>
                
                <button id="copy-btn" class="w-full py-4 bg-purple-900 hover:bg-purple-800 active:scale-[0.98] transition-all text-purple-100 font-black tracking-widest rounded-xl text-sm border-b-4 border-purple-950 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg" disabled>
                    COPY BASE64 STRING
                </button>
            </div>
            
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const outputArea = document.getElementById('output-area');
        const copyBtn = document.getElementById('copy-btn');
        const statusBar = document.getElementById('status-bar');
        const statusText = document.getElementById('status-text');
        const statusSpinner = document.getElementById('status-spinner');
        const fileSizeDisplay = document.getElementById('file-size-display');

        // Handle Drag Events for styling
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-purple-500', 'bg-purple-900/20');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-purple-500', 'bg-purple-900/20');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-purple-500', 'bg-purple-900/20');
            if (e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        });

        function processFile(file) {
            // UI Reset
            outputArea.value = "";
            copyBtn.disabled = true;
            copyBtn.innerText = "COPY BASE64 STRING";
            statusBar.classList.remove('hidden');
            statusSpinner.classList.remove('hidden');
            statusSpinner.classList.replace('bg-emerald-500', 'bg-purple-500');
            statusText.innerText = `Reading memory blocks for: ${file.name}...`;
            statusText.className = "text-xs font-mono text-purple-300";
            fileSizeDisplay.innerText = `Original Size: ${(file.size / 1024).toFixed(2)} KB`;

            const reader = new FileReader();
            
            reader.onload = function(event) {
                try {
                    statusText.innerText = `Encoding binary stream...`;
                    
                    // We use ArrayBuffer instead of DataURL to handle massive binary files safely
                    const arrayBuffer = event.target.result;
                    const bytes = new Uint8Array(arrayBuffer);
                    
                    let binaryStr = "";
                    // Chunking prevents "Maximum call stack size exceeded" errors on big files
                    const chunkSize = 8192; 
                    for (let i = 0; i < bytes.length; i += chunkSize) {
                        binaryStr += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
                    }
                    
                    const compiledBase64 = btoa(binaryStr);
                    
                    outputArea.value = compiledBase64;
                    copyBtn.disabled = false;
                    
                    statusSpinner.classList.add('hidden');
                    statusText.innerText = `COMPILER SUCCESS: "${file.name}" packed cleanly.`;
                    statusText.className = "text-xs font-mono font-bold text-emerald-400";
                    
                } catch (err) {
                    statusSpinner.classList.add('hidden');
                    statusText.innerText = `COMPILER FAULT: ${err.message}`;
                    statusText.className = "text-xs font-mono font-bold text-red-400";
                    outputArea.value = `ERROR:\n${err.message}`;
                }
            };

            reader.onerror = function() {
                statusSpinner.classList.add('hidden');
                statusText.innerText = "COMPILER FAULT: File read failed.";
                statusText.className = "text-xs font-mono font-bold text-red-400";
            };

            // Needs to be read as ArrayBuffer for clean parsing of arbitrary .task/.wasm files
            reader.readAsArrayBuffer(file);
        }

        copyBtn.addEventListener('click', async () => {
            if (!outputArea.value) return;
            
            const originalText = copyBtn.innerText;
            const originalClasses = copyBtn.className;

            const setSuccessUI = () => {
                copyBtn.innerText = "COPIED TO CLIPBOARD! ✔️";
                copyBtn.classList.replace('bg-purple-900', 'bg-emerald-700');
                copyBtn.classList.replace('hover:bg-purple-800', 'hover:bg-emerald-600');
                copyBtn.classList.replace('border-purple-950', 'border-emerald-900');
                copyBtn.classList.replace('text-purple-100', 'text-white');
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.className = originalClasses;
                }, 2000);
            };

            try {
                // Method 1: Modern Async Clipboard API
                await navigator.clipboard.writeText(outputArea.value);
                setSuccessUI();
            } catch (err) {
                // Method 2: Fallback for local `file:///` protocols
                outputArea.select();
                try {
                    document.execCommand('copy');
                    setSuccessUI();
                } catch (fallbackErr) {
                    alert("Copy blocked by browser. Please select the text and copy manually (Ctrl+C).");
                }
                // Deselect text
                window.getSelection().removeAllRanges();
            }
        });
    </script>
</body>
</html>
