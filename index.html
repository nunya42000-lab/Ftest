<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus OmniGesture Core Engine Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05050a; color: #f3f4f6; touch-action: none; overscroll-behavior: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .mirror { transform: scaleX(-1); }
    </style>
</head>
<body class="flex flex-col h-screen p-4 md:p-6 font-sans overflow-hidden">

    <!-- Header Grid -->
    <header class="flex justify-between items-center mb-4 flex-shrink-0 border-b border-emerald-950/40 pb-3">
        <div>
            <h1 class="text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-400 to-cyan-500">
                NEXUS GESTURE MATRIX & CALIBRATION LAB
            </h1>
            <p class="text-xs text-gray-500 font-mono tracking-wider">LIVE ENGINE TESTING & SKELETAL SNAPSHOT EXTRACTOR</p>
        </div>
        <div id="vision-status-badge" class="bg-emerald-950/30 text-yellow-500 px-3 py-1 rounded border border-yellow-500/30 text-xs font-mono font-bold tracking-widest animate-pulse">
            LOADING MATRIX CORE...
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 min-h-0 pb-4">
        
        <!-- Video Feed Frame Block -->
        <div class="flex flex-col min-h-0 space-y-4">
            <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden border border-gray-900 shadow-2xl flex-shrink-0">
                <video id="webcam" class="absolute inset-0 w-full h-full object-cover mirror" autoplay playsinline></video>
                <canvas id="output_canvas" class="absolute inset-0 w-full h-full object-cover mirror z-10 pointer-events-none"></canvas>
                
                <!-- Live Engine HUD -->
                <div id="gesture-hud-overlay" class="absolute bottom-4 left-4 z-20 bg-black/80 px-4 py-2 rounded-lg border border-emerald-500/30 font-mono text-xs hidden shadow-lg">
                    Engine Output: <span id="hud-current-gesture" class="text-emerald-400 font-black tracking-widest text-sm">none</span>
                </div>

                <!-- Countdown Overlay for Snapshots -->
                <div id="countdown-overlay" class="absolute inset-0 z-30 flex items-center justify-center bg-black/60 hidden backdrop-blur-sm">
                    <span id="countdown-text" class="text-7xl font-black text-emerald-400 animate-ping">3</span>
                </div>
            </div>

            <!-- Hardware Toggle -->
            <button id="start-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 transition-all text-white font-black tracking-widest py-4 rounded-xl text-sm border-b-4 border-emerald-800 disabled:opacity-40 disabled:pointer-events-none" disabled>
                BOOT CAMERA PIPELINE
            </button>

            <!-- Calibration Snapshot Tool -->
            <div class="bg-gray-950 p-4 rounded-xl border border-emerald-900/50 shadow-lg space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-mono text-emerald-400 font-bold tracking-widest">SNAPSHOT TOOL</span>
                    <span class="text-[10px] text-gray-500 font-mono">EXTRACT RAW (X,Y,Z)</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="gesture-label" placeholder="e.g. custom_peace_sign" class="flex-1 bg-black text-white px-3 py-2 rounded-lg border border-gray-800 font-mono text-sm focus:border-emerald-500 outline-none transition-colors">
                    <button id="snapshot-btn" class="bg-emerald-700 hover:bg-emerald-600 active:scale-95 text-white px-4 py-2 rounded-lg font-bold font-mono text-xs transition-all border border-emerald-500 shadow-lg">
                        📸 CAPTURE (3s)
                    </button>
                </div>
            </div>
        </div>

        <!-- System Logs & Export Console -->
        <div class="flex flex-col min-h-0 border border-gray-900 bg-black rounded-xl p-4 shadow-xl">
            <div class="flex items-center justify-between pb-3 border-b border-gray-900 mb-3 flex-shrink-0">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></div>
                    <span class="text-xs font-mono font-bold tracking-wider text-gray-400">DATA EXPORT BUFFER</span>
                </div>
                <div class="flex gap-2">
                    <button id="clear-export-btn" class="px-3 py-1.5 bg-gray-900 hover:bg-gray-800 active:scale-95 text-[10px] font-mono font-bold text-gray-500 hover:text-gray-300 rounded border border-gray-800 transition-all">
                        CLEAR
                    </button>
                    <button id="copy-export-btn" class="px-4 py-1.5 bg-gray-900 hover:bg-gray-800 active:scale-95 text-[10px] font-mono font-bold text-emerald-400 hover:text-white rounded border border-emerald-900 transition-all shadow-md">
                        COPY JSON DATA 📋
                    </button>
                </div>
            </div>
            
            <!-- JSON Output Area -->
            <textarea id="json-export" class="flex-1 bg-gray-950 border border-gray-900 rounded-lg p-3 font-mono text-[10px] text-emerald-500/80 resize-none outline-none focus:border-emerald-900 transition-all" readonly placeholder="// Extracted 21-point skeletal arrays will appear here..."></textarea>
            
            <!-- Standard Log -->
            <div id="log-container" class="h-28 overflow-y-auto font-mono text-[10px] space-y-1 pr-1 mt-3 border-t border-gray-900/50 pt-2 no-scrollbar flex flex-col-reverse">
                <div class="text-gray-700 italic mt-auto">Hardware execution loop ready...</div>
            </div>
        </div>
    </main>

    <script type="module">
        import { FilesetResolver, GestureRecognizer } from "./wasm/vision_bundle.js";

        // Provide file path fallback logic for offline execution
        const TASK_FILE_PATH = "./wasm/gesture_recognizer.task";

        // --- DOM Elements ---
        const video = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusBadge = document.getElementById('vision-status-badge');
        const logContainer = document.getElementById('log-container');
        
        const hudOverlay = document.getElementById('gesture-hud-overlay');
        const hudCurrentGesture = document.getElementById('hud-current-gesture');

        const snapshotBtn = document.getElementById('snapshot-btn');
        const gestureLabel = document.getElementById('gesture-label');
        const jsonExport = document.getElementById('json-export');
        const copyExportBtn = document.getElementById('copy-export-btn');
        const clearExportBtn = document.getElementById('clear-export-btn');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownText = document.getElementById('countdown-text');

        // --- Engine State Configuration ---
        let recognizer;
        let webcamRunning = false;
        let lastVideoTime = -1;
        let capturePending = false;
        let snapshots = [];

        // --- Core Logging Pipeline ---
        function streamLog(msg, type = 'normal') {
            const timestamp = new Date().toISOString().slice(11, 19);
            const row = document.createElement('div');
            if (type === 'trigger') row.className = 'text-emerald-400 font-bold';
            else if (type === 'error') row.className = 'text-red-400 font-bold';
            else row.className = 'text-gray-500';
            row.textContent = `[${timestamp}] ${msg}`;
            logContainer.prepend(row);
        }

        // --- Calibration Snapshot Trigger Logic ---
        snapshotBtn.onclick = () => {
            if (!webcamRunning) return streamLog("Camera hardware offline.", "error");
            const label = gestureLabel.value.trim() || "unlabeled_pose";
            
            snapshotBtn.disabled = true;
            countdownOverlay.classList.remove('hidden');
            
            let count = 3;
            countdownText.textContent = count;
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownText.textContent = count;
                } else {
                    clearInterval(timer);
                    countdownOverlay.classList.add('hidden');
                    capturePending = label; // Arm the trap for the next video frame
                    snapshotBtn.disabled = false;
                }
            }, 1000);
        };

        clearExportBtn.onclick = () => {
            snapshots = [];
            jsonExport.value = "";
            streamLog("Export buffer flushed.", "info");
        };

        copyExportBtn.onclick = async () => {
            if (snapshots.length === 0) return;
            try {
                await navigator.clipboard.writeText(JSON.stringify(snapshots, null, 2));
                const prev = copyExportBtn.innerHTML; 
                copyExportBtn.innerHTML = "COPIED TO CLIPBOARD! ✔️";
                setTimeout(() => copyExportBtn.innerHTML = prev, 1500);
            } catch (err) { alert("Clipboard blocked. Select text manually."); }
        };

        // --- AI Model Loader Pipeline Initialization ---
        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("./wasm");
                recognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: TASK_FILE_PATH, delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                
                statusBadge.textContent = "CORE ONLINE";
                statusBadge.className = "bg-emerald-950 text-emerald-400 px-3 py-1 rounded border border-emerald-500/40 text-xs font-mono font-bold tracking-widest";
                startBtn.disabled = false;
                streamLog("Skeletal Task Module running.", "normal");
                
            } catch (e) {
                streamLog(`INIT ERROR: ${e.message}`, "error");
                statusBadge.textContent = "CORE FAULT";
            }
        }

        // --- Camera Feed State Hooks ---
        startBtn.onclick = () => {
            if (!recognizer) return;
            if (webcamRunning) {
                webcamRunning = false;
                if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                startBtn.innerText = "BOOT CAMERA PIPELINE";
                startBtn.className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl text-sm border-b-4 border-emerald-800";
                hudOverlay.classList.add('hidden');
                return;
            }

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", () => {
                        webcamRunning = true;
                        hudOverlay.classList.remove('hidden');
                        startBtn.innerText = "SHUTDOWN RAW STREAM";
                        startBtn.className = "w-full bg-red-950 text-red-400 font-black py-4 rounded-xl text-sm border border-red-500/40";
                        predictWebcam();
                    });
                })
                .catch((err) => streamLog(`STREAM EXCEPTION: ${err.message}`, "error"));
        };

        // --- Upgraded Omni-Directional Finger Counter (Fixes Thumb Off-By-One) ---
        function countFingers(lm) {
            let count = 0;
            const wrist = lm[0]; 
            
            // 1. Standard Fingers: Is the tip further from the wrist than the middle knuckle?
            const isExtended = (tipIdx, pipIdx) => {
                const tipDist = Math.hypot(lm[tipIdx].x - wrist.x, lm[tipIdx].y - wrist.y);
                const pipDist = Math.hypot(lm[pipIdx].x - wrist.x, lm[pipIdx].y - wrist.y);
                return tipDist > (pipDist * 1.2); 
            };

            if (isExtended(8, 6)) count++;   // Index
            if (isExtended(12, 10)) count++; // Middle
            if (isExtended(16, 14)) count++; // Ring
            if (isExtended(20, 18)) count++; // Pinky

            // 2. Thumb Logic: Compares thumb tip to index base instead of strict X-axis.
            const thumbTipToIndexBase = Math.hypot(lm[4].x - lm[5].x, lm[4].y - lm[5].y);
            const thumbKnuckleToIndexBase = Math.hypot(lm[2].x - lm[5].x, lm[2].y - lm[5].y);
            
            if (thumbTipToIndexBase > (thumbKnuckleToIndexBase * 1.3)) {
                count++;
            }

            return count;
        }

        // --- Production Visual Renderer ---
        function drawSkeleton(ctx, landmarks, w, h) {
            const connectors = [
                [0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8],
                [5, 9], [9, 10], [10, 11], [11, 12], [9, 13], [13, 14], [14, 15], [15, 16],
                [13, 17], [0, 17], [17, 18], [18, 19], [19, 20]
            ];
            ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#059669";
            for (const [start, end] of connectors) {
                ctx.beginPath(); ctx.moveTo(landmarks[start].x * w, landmarks[start].y * h);
                ctx.lineTo(landmarks[end].x * w, landmarks[end].y * h); ctx.stroke();
            }
            ctx.fillStyle = "#ffffff";
            for (const p of landmarks) {
                ctx.beginPath(); ctx.arc(p.x * w, p.y * h, 2.5, 0, 2 * Math.PI); ctx.fill();
            }
        }

        // --- Hardware Execution Predictive Frame Analysis Loop ---
        function predictWebcam() {
            if (!webcamRunning) return;

            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;
            const w = canvasElement.width;
            const h = canvasElement.height;

            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                try {
                    const results = recognizer.recognizeForVideo(video, performance.now());
                    canvasCtx.clearRect(0, 0, w, h);

                    if (results.landmarks && results.landmarks.length > 0) {
                        const lm = results.landmarks[0];
                        drawSkeleton(canvasCtx, lm, w, h);

                        // --- 1. LIVE ENGINE EVALUATION ---
                        const fingers = countFingers(lm);
                        const dx = lm[9].x - lm[0].x; // Middle finger base vs Wrist X
                        const dy = lm[9].y - lm[0].y; // Middle finger base vs Wrist Y
                        let dir = "";
                        
                        // Calculate primary vector direction
                        if (Math.abs(dx) > Math.abs(dy)) {
                            dir = dx < 0 ? "right" : "left"; // Flipped for mirror mode
                        } else {
                            dir = dy < 0 ? "up" : "down"; 
                        }
                        
                        const currentGesture = (fingers === 0) ? "hand_fist" : `hand_${fingers}_${dir}`;
                        hudCurrentGesture.textContent = currentGesture;

                        // --- 2. SNAPSHOT EXTRACTION TRAP ---
                        if (capturePending !== false) {
                            const snapshotData = {
                                label: capturePending,
                                engine_interpretation: currentGesture,
                                timestamp: Date.now(),
                                landmarks: lm.map(p => ({ x: p.x.toFixed(4), y: p.y.toFixed(4), z: p.z.toFixed(4) }))
                            };
                            
                            snapshots.push(snapshotData);
                            jsonExport.value = JSON.stringify(snapshots, null, 2);
                            jsonExport.scrollTop = jsonExport.scrollHeight; // Auto-scroll
                            
                            streamLog(`SNAPSHOT SAVED: [${capturePending}]`, 'trigger');
                            document.body.style.backgroundColor = '#ffffff'; // Screen flash
                            setTimeout(() => document.body.style.backgroundColor = '#05050a', 150);
                            
                            capturePending = false; // Disarm trap
                        }
                    } else {
                        hudCurrentGesture.textContent = "none";
                        if (capturePending !== false) {
                            streamLog(`SNAPSHOT FAILED: No hand detected in frame.`, 'error');
                            capturePending = false;
                        }
                    }
                } catch (e) {
                    streamLog(`Frame Analysis Pipeline Error: ${e.message}`, "error");
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        initAI();
    </script>
</body>
</html>
