<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vision Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; color: #fff; touch-action: manipulation; }
        .mirror { transform: scaleX(-1); }
        /* Forces scrollable log area */
        #log-container { height: 300px; overflow-y: scroll; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Fixed Header -->
    <header class="p-4 border-b border-gray-800 bg-gray-950 flex justify-between items-center z-50">
        <h1 class="text-lg font-black text-emerald-400">VISION TRAINER</h1>
        <div id="status-badge" class="px-2 py-1 rounded bg-gray-900 border border-gray-700 text-[10px] font-mono">INIT...</div>
    </header>

    <!-- Scrolling Wrapper -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4">
        
        <!-- Camera Area -->
        <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden border border-gray-700">
            <video id="webcam" class="absolute inset-0 w-full h-full object-cover mirror" autoplay playsinline></video>
            <canvas id="output_canvas" class="absolute inset-0 w-full h-full object-cover mirror z-10"></canvas>
        </div>

        <!-- Prompt -->
        <div id="director-prompt" class="bg-gray-900 p-4 rounded-xl text-center font-bold border border-gray-800">
            Click 'Boot' to start...
        </div>

        <!-- Logs -->
        <div id="log-container" class="bg-black p-4 rounded-xl border border-gray-800 font-mono text-[10px] space-y-2">
            <div class="text-gray-500">Log output initialized...</div>
        </div>

    </div>

    <!-- Fixed Footer Control -->
    <footer class="p-4 bg-gray-950 border-t border-gray-800">
        <button id="start-btn" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-white active:scale-95 transition-transform">
            BOOT CAMERA HARDWARE
        </button>
    </footer>

    <script type="module">
        import { FilesetResolver, GestureRecognizer } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const status = document.getElementById('status-badge');
        const log = document.getElementById('log-container');
        const prompt = document.getElementById('director-prompt');

        let recognizer;
        let running = false;

        function addLog(msg) {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.prepend(div);
        }

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("./");
            recognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "./gesture_recognizer.task", delegate: "GPU" },
                runningMode: "VIDEO",
                numHands: 1
            });
            status.textContent = "AI READY";
            status.className = "px-2 py-1 rounded bg-emerald-900 border border-emerald-500 text-[10px] font-mono";
            addLog("Engine ready.");
        }

        startBtn.onclick = async () => {
            if (running) {
                location.reload();
                return;
            }
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            running = true;
            startBtn.textContent = "RELOAD ENGINE";
            predict();
        };

        function predict() {
            if (!running) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const results = recognizer.recognizeForVideo(video, performance.now());
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.landmarks && results.landmarks.length > 0) {
                const lm = results.landmarks[0];
                
                // Draw Skeleton
                ctx.strokeStyle = "#10b981";
                ctx.lineWidth = 3;
                lm.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x * canvas.width, p.y * canvas.height, 4, 0, 2 * Math.PI);
                    ctx.stroke();
                });
                addLog("Hand detected, tracking...");
            }
            
            requestAnimationFrame(predict);
        }

        init();
    </script>
</body>
</html>
